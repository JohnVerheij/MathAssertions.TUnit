name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same ref to avoid wasting minutes on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, test & pack
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test main suite (with coverage)
        # TUnit on .NET 10 SDK invokes via the test exe directly. The Microsoft.Testing.Platform
        # --coverage flag enables Microsoft.CodeCoverage collection (transitively pulled via TUnit).
        # --coverage-settings is required: without an explicit ModulePaths/Include in the
        # settings file, Microsoft.CodeCoverage emits an empty 178-byte cobertura skeleton on
        # Linux runners (it instruments nothing because nothing is in scope). The settings file
        # uses the MTP flat Configuration/CodeCoverage schema, NOT the VSTest
        # DataCollectionRunSettings wrapper, which the coverage-settings flag does not accept.
        # The = form for --coverage-output-format avoids a documented MTP space-form mis-parse.
        run: |
          dotnet run --project tests/MathAssertions.TUnit.Tests/MathAssertions.TUnit.Tests.csproj \
            --configuration Release --no-build \
            -- \
            --coverage \
            --coverage-settings .config/codecoverage.settings.xml \
            --coverage-output coverage.cobertura.xml \
            --coverage-output-format=cobertura

      - name: Locate coverage report
        id: coverage
        run: |
          # The test exe writes coverage relative to the test bin directory; surface its path.
          # Failing fast if no report is found prevents a silent bypass of the coverage gate
          # when coverage collection itself breaks (tool version drift, MTP schema change,
          # instrumentation regression). The downstream threshold step's `if:` guard then
          # acts as defensive belt-and-suspenders rather than the actual gate.
          REPORT=$(find tests -name 'coverage.cobertura.xml' -print -quit)
          if [ -z "$REPORT" ]; then
            echo "::error::No cobertura coverage report found; coverage collection broken"
            exit 1
          fi
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"
          echo "Coverage report: $REPORT"

      # Codecov upload runs BEFORE the threshold check so the coverage trend is visible
      # in Codecov's UI even when the threshold gate fails the build. Without this ordering,
      # a failing threshold short-circuits the upload (default `if: success()`) and the
      # PR shows no Codecov data.
      - name: Upload coverage to Codecov
        if: steps.coverage.outputs.report != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ${{ steps.coverage.outputs.report }}
          fail_ci_if_error: false
          verbose: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Hard gates: fail the build if line OR branch coverage drops below threshold.
      # The cobertura XML's top-level <coverage line-rate="X.XX" branch-rate="Y.YY"> is
      # the source of truth. Thresholds match the project's quality bar; bump them up
      # over time, never down.
      - name: Check coverage thresholds
        if: steps.coverage.outputs.report != ''
        env:
          LINE_THRESHOLD: '0.90'
          BRANCH_THRESHOLD: '0.90'
        run: |
          REPORT='${{ steps.coverage.outputs.report }}'
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' "$REPORT" | head -1)
          BRANCH_RATE=$(grep -oP 'branch-rate="\K[^"]+' "$REPORT" | head -1)
          if [ -z "$LINE_RATE" ] || [ -z "$BRANCH_RATE" ]; then
            echo "::error::Could not extract line-rate or branch-rate from $REPORT"
            exit 1
          fi

          LINE_PCT=$(awk -v r="$LINE_RATE" 'BEGIN { printf "%.2f", r * 100 }')
          BRANCH_PCT=$(awk -v r="$BRANCH_RATE" 'BEGIN { printf "%.2f", r * 100 }')
          LINE_THR_PCT=$(awk -v t="$LINE_THRESHOLD" 'BEGIN { printf "%.2f", t * 100 }')
          BRANCH_THR_PCT=$(awk -v t="$BRANCH_THRESHOLD" 'BEGIN { printf "%.2f", t * 100 }')
          echo "Line coverage:   ${LINE_PCT}%   (threshold: ${LINE_THR_PCT}%)"
          echo "Branch coverage: ${BRANCH_PCT}% (threshold: ${BRANCH_THR_PCT}%)"

          FAILED=0
          if [ "$(awk -v r="$LINE_RATE" -v t="$LINE_THRESHOLD" 'BEGIN { print (r < t) ? 1 : 0 }')" = "1" ]; then
            echo "::error::Line coverage ${LINE_PCT}% is below threshold ${LINE_THR_PCT}%"
            FAILED=1
          fi
          if [ "$(awk -v r="$BRANCH_RATE" -v t="$BRANCH_THRESHOLD" 'BEGIN { print (r < t) ? 1 : 0 }')" = "1" ]; then
            echo "::error::Branch coverage ${BRANCH_PCT}% is below threshold ${BRANCH_THR_PCT}%"
            FAILED=1
          fi
          [ "$FAILED" = "0" ]

      - name: Test framework-agnostic core suite (no coverage)
        # tests/MathAssertions.Tests references ONLY the MathAssertions core package, NOT
        # MathAssertions.TUnit. Catches accidental coupling: if a refactor made the core depend
        # on TUnit, this project would fail to compile. Coverage of the core types is already
        # captured in the main suite via the TUnit chain, so coverage is intentionally not
        # collected here.
        run: |
          dotnet run --project tests/MathAssertions.Tests/MathAssertions.Tests.csproj \
            --configuration Release --no-build

      - name: Test snapshot suite (no coverage)
        # SnapshotTests pins the public API surface using SnapshotAssertions.TUnit's
        # MatchesSnapshot() chain. Cross-package dogfooding (this repo consumes a sibling
        # family package by PackageReference). Run in a separate step from the main coverage
        # run because the project measures API surface, not behaviour: its execution
        # contributes nothing useful to the coverage rate. The .config/codecoverage.settings.xml
        # already restricts ModulePaths to the production DLLs so SnapshotTests-internal code
        # is excluded automatically; the separate step makes that intent explicit.
        run: |
          dotnet run --project tests/MathAssertions.TUnit.SnapshotTests/MathAssertions.TUnit.SnapshotTests.csproj \
            --configuration Release --no-build

      - name: Pack MathAssertions (core)
        run: dotnet pack src/MathAssertions/MathAssertions.csproj --configuration Release --no-build --output ./artifacts

      - name: Pack MathAssertions.TUnit (TUnit adapter)
        run: dotnet pack src/MathAssertions.TUnit/MathAssertions.TUnit.csproj --configuration Release --no-build --output ./artifacts

      - name: External-consumer smoke test (restore+build+test against just-packed nupkgs)
        # The smoke-test project lives outside MathAssertions.TUnit.slnx and consumes
        # MathAssertions.TUnit ONLY via PackageReference (NOT ProjectReference). Its NuGet.config
        # routes MathAssertions.* to the just-packed local feed at ./artifacts. The project's
        # namespace is deliberately NOT under MathAssertions.TUnit so any future regression of a
        # namespace-resolution bug class (entry points hidden behind an explicit using) fails the
        # smoke build before the package can ship.
        #
        # NuGet's relative-path resolution for local sources is fragile on Linux runners: the
        # NuGet.config-relative "../../artifacts" sometimes fails NU1561 even after the previous
        # Pack steps wrote nupkgs there. Bypass by passing an absolute --source flag derived from
        # $GITHUB_WORKSPACE, which is unambiguous regardless of NuGet's path-resolution context.
        # The existing NuGet.config still provides the packageSourceMapping that routes
        # MathAssertions.* to local-pack at restore time. The explicit "ls" gives a one-line
        # diagnostic if pack ever silently fails to produce artifacts.
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE/artifacts/" || (echo "::error::artifacts/ missing; Pack steps did not produce nupkgs" && exit 1)
          dotnet restore tests/MathAssertions.TUnit.SmokeTest/MathAssertions.TUnit.SmokeTest.csproj \
            --force-evaluate \
            --source "$GITHUB_WORKSPACE/artifacts" \
            --source "https://api.nuget.org/v3/index.json"
          dotnet build tests/MathAssertions.TUnit.SmokeTest/MathAssertions.TUnit.SmokeTest.csproj --configuration Release --no-restore
          dotnet run --project tests/MathAssertions.TUnit.SmokeTest/MathAssertions.TUnit.SmokeTest.csproj --configuration Release --no-build

      - name: AOT-publish gate (smoke project, linux-x64)
        # End-to-end AOT validation: the package's csproj sets IsAotCompatible=true (which keeps
        # the build-time AOT analyzer active during normal `dotnet build`), but only `dotnet
        # publish -r <RID> -p:PublishAot=true` actually invokes ILCompiler and proves there are
        # no late-bound surprises. The smoke project sets PublishAot=true conditional on
        # RuntimeIdentifier so day-to-day builds aren't dragged through ILCompiler. Failing this
        # step blocks a release; passing means an AOT-targeting consumer will publish cleanly.
        run: |
          dotnet publish tests/MathAssertions.TUnit.SmokeTest/MathAssertions.TUnit.SmokeTest.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --source "$GITHUB_WORKSPACE/artifacts" \
            --source "https://api.nuget.org/v3/index.json"

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
          retention-days: 7
