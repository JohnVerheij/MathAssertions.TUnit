name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MathAssertions.TUnit.slnx

      - name: Build (so XML docs exist in obj/)
        run: dotnet build MathAssertions.TUnit.slnx --configuration Release --no-restore

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Copy markdown sources into docs/
        run: |
          cp README.md docs/index.md
          cp CHANGELOG.md docs/changelog.md
          cp CONVENTIONS.md docs/conventions.md
          cp CONTRIBUTING.md docs/contributing.md
          cp CODE_OF_CONDUCT.md docs/coc.md
          cp SECURITY.md docs/security.md
          { echo "# License"; echo; echo '```'; cat LICENSE; echo '```'; } > docs/license.md

      - name: Build docs
        run: docfx docs/docfx.json

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
