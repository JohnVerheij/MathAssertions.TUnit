name: Family Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Test the lint gate
        run: python3 .github/test_family_lint.py

      - name: Lint CHANGELOG + PackageTags
        run: python3 .github/family-lint.py
